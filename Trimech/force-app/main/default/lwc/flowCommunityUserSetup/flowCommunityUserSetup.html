<template>
    <lightning-card title="Community User Setup">

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium">
            </lightning-spinner>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">Error</span>
                <h2>{errorMessage}</h2>
            </div>
        </template>

        <div class="slds-grid slds-wrap slds-gutters">
            <!-- Text Fields -->
            <div class="slds-col slds-size_1-of-1">
                <lightning-input label="First Name" value={firstName} onchange={handleChange} data-field="FirstName"
                    required></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-input label="Last Name" value={lastName} onchange={handleChange} data-field="LastName"
                    required></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-input label="Email" type="email" value={email} onchange={handleChange} data-field="Email"
                    required></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-input label="Username" value={username} onchange={handleChange} data-field="Username"
                    required></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-input label="Phone" type="tel" value={phone} onchange={handleChange}
                    data-field="Phone"></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-input label="Community Nickname" value={communityNickname} onchange={handleChange}
                    data-field="CommunityNickname" required></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-input label="Alias" value={alias} onchange={handleChange} data-field="Alias"
                    required></lightning-input>
            </div>

            <!-- Picklists -->
            <div class="slds-col slds-size_1-of-1">
                <lightning-combobox label="Time Zone" value={timeZoneSidKey} options={timeZoneOptions}
                    onchange={handleChange} data-field="TimeZoneSidKey" required></lightning-combobox>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-combobox label="Locale" value={localeSidKey} options={localeOptions} onchange={handleChange}
                    data-field="LocaleSidKey" required></lightning-combobox>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-combobox label="Email Encoding" value={emailEncodingKey} options={emailEncodingOptions}
                    onchange={handleChange} data-field="EmailEncodingKey" required></lightning-combobox>
            </div>
            <div class="slds-col slds-size_1-of-1">
                <lightning-combobox label="Language" value={languageLocaleKey} options={languageOptions}
                    onchange={handleChange} data-field="LanguageLocaleKey" required></lightning-combobox>
            </div>

            <!-- Checkboxes -->
            <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                <lightning-input type="checkbox" label="Is Active" checked={isActive} onchange={handleChange}
                    data-field="IsActive"></lightning-input>
            </div>

            <!-- Read-only Profile -->
            <div class="slds-col slds-size_1-of-1">
                <lightning-input type="text" label="Profile" value={profileName} disabled
                    variant="label-inline"></lightning-input>
            </div>

            <!-- Buttons -->
            <div class="slds-m-top_large slds-align_absolute-center">
                <lightning-button variant="neutral" label="Previous" onclick={handlePrevious} class="slds-m-right_small">
                </lightning-button>
                <lightning-button variant="brand" label="Next" onclick={handleNext} disabled={isSaving}>
                </lightning-button>
            </div>


        </div>
    </lightning-card>
</template>
